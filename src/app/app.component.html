<div class="app-shell" [class.collapsed]="sidebarCollapsed()">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <mat-icon>shield</mat-icon>
      </div>
      <span class="brand-name">KMS</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">GESTION</div>
      <a class="nav-item" routerLink="/applications/1026/keys" routerLinkActive="active">
        <mat-icon>vpn_key</mat-icon>
        <span>Clés cryptographiques</span>
      </a>
      <a class="nav-item" routerLink="/applications" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>apps</mat-icon>
        <span>Applications</span>
      </a>
      <a class="nav-item" routerLink="/certificates" routerLinkActive="active">
        <mat-icon>verified_user</mat-icon>
        <span>Certificats</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card" (click)="openTeamSwitcher()" matTooltip="Changer de profil" matTooltipPosition="right">
        <div class="user-avatar" [style.background]="activeProfile().avatarGradient">
          {{ activeProfile().initials }}
        </div>
        <div class="user-info">
          <span class="user-name">{{ activeProfile().name }}</span>
          <span class="user-role">{{ activeProfile().role }}</span>
        </div>
        <mat-icon class="user-switch-icon">unfold_more</mat-icon>
      </div>
    </div>
  </aside>

  <!-- ── Main area ─────────────────────────────────────────── -->
  <div class="main-area">

    <!-- Navbar -->
    <header class="top-navbar">
      <button mat-icon-button class="menu-btn" (click)="toggleSidebar()" matTooltip="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="navbar-breadcrumb">
        <span class="breadcrumb-root">KMS</span>
        <mat-icon class="breadcrumb-sep">chevron_right</mat-icon>
        <span class="breadcrumb-current">
          Crypto Key Manager
        </span>
      </div>
      <div class="navbar-actions">
        <app-env-badge />
        <button mat-icon-button matTooltip="Notifications">
          <mat-icon>notifications_none</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Thème de l'interface" (click)="openThemeSwitcher()">
          <mat-icon>palette</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Changer de profil" (click)="openTeamSwitcher()">
          <mat-icon>manage_accounts</mat-icon>
        </button>
        <div
          class="navbar-avatar"
          [style.background]="activeProfile().avatarGradient"
          matTooltip="{{ activeProfile().name }}"
          (click)="openTeamSwitcher()"
          style="cursor:pointer"
        >{{ activeProfile().initials }}</div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet />
    </main>

  </div>
</div>
